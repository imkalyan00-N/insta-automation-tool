<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durga Portfolio</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#4f46e5);
}

.card{
    width:350px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    text-align:center;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:white;
    color:#4f46e5;
    font-size:35px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
}

h1{
    margin-top:20px;
}

.id{
    color:#cbd5e1;
    margin-top:5px;
}

.role{
    margin-top:15px;
    font-size:18px;
    color:#e2e8f0;
}

.desc{
    margin-top:15px;
    line-height:1.6;
    color:#dbeafe;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 30px;
    border-radius:30px;
    background:white;
    color:#4f46e5;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">D</div>

    <h1>Durga</h1>

    <p class="id">@sleeping_beauty_019</p>

    <p class="role">B.Tech IoT Student</p>

    <p class="desc">
        Passionate about IoT, Smart Devices,
        Embedded Systems and Future Technologies.
    </p>

    <a href="#" class="btn">Connect</a>

</div>

</body>
</html>
